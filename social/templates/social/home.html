{% extends 'social/base.html' %}

{% block content %}
<style>
    .bubble-container {
        position: relative;
        width: 100%;
        height: 80vh;
        overflow: hidden;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 30px;
        padding: 20px;
    }

    .bubble {
        position: absolute;
        background: white;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        animation: floatUp linear infinite;
        will-change: transform;
    }

    .bubble:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        animation-play-state: paused;
    }

    .bubble-username {
        font-weight: bold;
        font-size: 1rem;
        color: #333;
    }

    .bubble-type {
        font-size: 0.7rem;
        color: #666;
        margin-top: 4px;
    }

    .bubble-buttons {
        margin-top: 10px;
        display: none;
        gap: 8px;
    }

    .bubble:hover .bubble-buttons {
        display: flex;
    }

    .btn-follow, .btn-like {
        background: #1877f2;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.7rem;
        cursor: pointer;
    }

    .btn-like {
        background: #e0245e;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(100vh);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        90% {
            opacity: 1;
        }
        100% {
            transform: translateY(-20vh);
            opacity: 0;
        }
    }
</style>

<h2 style="text-align: center;">Floating Accounts</h2>
<div class="bubble-container" id="bubbleContainer">
    {% for user in other_users %}
        <div class="bubble" data-username="{{ user.username }}">
            <div class="bubble-username">{{ user.username }}</div>
            <div class="bubble-type">{{ user.profile.get_account_type_display }}</div>
            <div class="bubble-buttons">
                <form action="{% url 'follow' user.username %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-follow">Follow</button>
                </form>
                <form action="{% url 'like_user' user.username %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-like">❤️ Like</button>
                </form>
            </div>
        </div>
    {% empty %}
        <p style="color: white; text-align: center;">No other users yet.</p>
    {% endfor %}
</div>

<script>
    const container = document.getElementById('bubbleContainer');
    const bubbles = document.querySelectorAll('.bubble');

    bubbles.forEach(bubble => {
        const randomLeft = Math.random() * (container.clientWidth - 140);
        bubble.style.left = randomLeft + 'px';

        const duration = 6 + Math.random() * 6;
        bubble.style.animationDuration = duration + 's';

        const delay = Math.random() * 5;
        bubble.style.animationDelay = delay + 's';
    });

    window.addEventListener('resize', () => {
        bubbles.forEach(bubble => {
            const randomLeft = Math.random() * (container.clientWidth - 140);
            bubble.style.left = randomLeft + 'px';
        });
    });
</script>
{% endblock %}
